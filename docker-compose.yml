services:
  client:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4444:4444"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - server
  server:
    environment:
      DATABASE_URL: "postgresql+asyncpg://user:password@db:5432/todos"

    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18-alpine
    container_name: todos_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: todos
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d todos"]
      interval: 10s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4
    container_name: todos_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5053:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
