services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server
      - client

  client:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "4444"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - server

  server:
    env_file:
      - .env

    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "4000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18-alpine
    container_name: todos_db
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
